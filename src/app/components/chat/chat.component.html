<section class="chat-section">
  <div class="chat" data-swiper-parallax="-250">
    <div class="chat-content">
      <h1 class="chat-title">Чат</h1>
      <p class="chat-description-item">
        Мы создали чат для гостей, чтобы вы могли общаться, делиться впечатлениями и задавать вопросы.
      </p>
    </div>
  </div>
  <div class="chat-button-wrapper">
    <button (click)="openChat()" class="chat-button" data-swiper-parallax="-350">Перейти в чат</button>
  </div>
</section>
